<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow Notes // Nightmare</title>
  <style>
    :root {
      --bg: #050508; --surface: #0e1020; --border: #1a1d2e;
      --text: #f0eeeb; --dim: #585a64; --accent: #e63946;
      --green: #4ade80; --blue: #60a5fa; --yellow: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
      display: flex; height: 100vh; overflow: hidden;
    }

    .sidebar {
      width: 260px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--accent); letter-spacing: 2px;
      text-transform: uppercase;
    }
    .sidebar-actions { padding: 8px; display: flex; gap: 6px; }
    .sidebar-actions button {
      flex: 1; padding: 6px; font-size: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text); border-radius: 4px;
      cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
    }
    .sidebar-actions button:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .file-item {
      padding: 8px 16px; font-size: 11px; cursor: pointer;
      color: var(--dim); border-left: 2px solid transparent;
      transition: all 0.1s;
    }
    .file-item:hover { background: rgba(230,57,70,0.05); color: var(--text); }
    .file-item.active { background: rgba(230,57,70,0.1); color: var(--accent);
      border-left-color: var(--accent); }
    .file-item .file-name { display: block; }
    .file-item .file-meta { font-size: 9px; color: var(--dim); margin-top: 2px; }

    .editor-area { flex: 1; display: flex; flex-direction: column; }
    .editor-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--dim); display: flex; justify-content: space-between;
      align-items: center;
    }
    .editor-header .file-path { color: var(--accent); }
    .editor-header .save-status { font-size: 10px; }
    .save-status.saved { color: var(--green); }
    .save-status.unsaved { color: var(--yellow); }
    .save-status.saving { color: var(--blue); }

    #editor {
      flex: 1; width: 100%; border: none; background: transparent;
      color: var(--text); font-family: inherit; font-size: 13px;
      padding: 20px; line-height: 1.8; resize: none; outline: none;
      tab-size: 2;
    }

    .editor-footer {
      padding: 8px 20px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--dim); display: flex; gap: 16px;
    }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: var(--dim); font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">Shadow Notes</div>
    <div class="sidebar-actions">
      <button id="btn-new">+ New</button>
      <button id="btn-delete">Delete</button>
    </div>
    <div id="file-list" class="file-list"></div>
  </div>

  <div class="editor-area">
    <div class="editor-header">
      <span class="file-path" id="current-file">No file selected</span>
      <span class="save-status saved" id="save-status">Ready</span>
    </div>
    <textarea id="editor" placeholder="Start writing..."></textarea>
    <div class="editor-footer">
      <span id="char-count">0 chars</span>
      <span id="line-count">0 lines</span>
      <span id="word-count">0 words</span>
      <span>Auto-save: ON</span>
    </div>
  </div>

  <script>
    var fsModule, pathModule, osModule;
    var hasNode = false;
    try {
      fsModule = require('fs');
      pathModule = require('path');
      osModule = require('os');
      hasNode = true;
    } catch(e) {}

    var notesDir = '';
    var currentFile = null;
    var saveTimer = null;
    var editorEl = document.getElementById('editor');
    var fileListEl = document.getElementById('file-list');
    var currentFileEl = document.getElementById('current-file');
    var saveStatusEl = document.getElementById('save-status');

    function init() {
      if (!hasNode) {
        document.querySelector('.empty-state') || (document.querySelector('.editor-area').textContent = 'Node.js initialization error.');
        return;
      }
      notesDir = pathModule.join(osModule.homedir(), 'Nightmare-Notes');
      if (!fsModule.existsSync(notesDir)) {
        fsModule.mkdirSync(notesDir, { recursive: true });
      }
      loadFileList();

      // Create a welcome note if empty
      var files = fsModule.readdirSync(notesDir).filter(function(f) { return f.endsWith('.md'); });
      if (files.length === 0) {
        var welcomePath = pathModule.join(notesDir, 'welcome.md');
        fsModule.writeFileSync(welcomePath, '# Welcome to Shadow Notes\n\nThis note was created by **Nightmare Browser**.\n\nYour notes are saved directly to:\n`' + notesDir + '`\n\nNo cloud. No sync. No tracking. Just raw filesystem.\n\n## Features\n- Auto-save as you type\n- Markdown files on disk\n- Full Node.js access\n- Zero network dependency\n');
        loadFileList();
        openFile('welcome.md');
      }
    }

    function loadFileList() {
      fileListEl.textContent = '';
      if (!hasNode) return;
      var files = fsModule.readdirSync(notesDir).filter(function(f) { return f.endsWith('.md'); }).sort();
      files.forEach(function(f) {
        var stat = fsModule.statSync(pathModule.join(notesDir, f));
        var item = document.createElement('div');
        item.className = 'file-item' + (currentFile === f ? ' active' : '');

        var name = document.createElement('span');
        name.className = 'file-name';
        name.textContent = f.replace('.md', '');
        item.appendChild(name);

        var meta = document.createElement('span');
        meta.className = 'file-meta';
        var size = stat.size > 1024 ? (stat.size / 1024).toFixed(1) + ' KB' : stat.size + ' B';
        meta.textContent = size + ' // ' + new Date(stat.mtime).toLocaleDateString();
        item.appendChild(meta);

        item.addEventListener('click', function() { openFile(f); });
        fileListEl.appendChild(item);
      });
    }

    function openFile(filename) {
      currentFile = filename;
      var content = fsModule.readFileSync(pathModule.join(notesDir, filename), 'utf8');
      editorEl.value = content;
      currentFileEl.textContent = notesDir + '/' + filename;
      saveStatusEl.textContent = 'Saved';
      saveStatusEl.className = 'save-status saved';
      updateCounts();
      loadFileList();
    }

    function saveFile() {
      if (!currentFile || !hasNode) return;
      saveStatusEl.textContent = 'Saving...';
      saveStatusEl.className = 'save-status saving';
      fsModule.writeFileSync(pathModule.join(notesDir, currentFile), editorEl.value, 'utf8');
      saveStatusEl.textContent = 'Saved';
      saveStatusEl.className = 'save-status saved';
    }

    function updateCounts() {
      var text = editorEl.value;
      document.getElementById('char-count').textContent = text.length + ' chars';
      document.getElementById('line-count').textContent = (text.split('\n').length) + ' lines';
      document.getElementById('word-count').textContent = (text.trim() ? text.trim().split(/\s+/).length : 0) + ' words';
    }

    editorEl.addEventListener('input', function() {
      saveStatusEl.textContent = 'Unsaved';
      saveStatusEl.className = 'save-status unsaved';
      updateCounts();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveFile, 800);
    });

    document.getElementById('btn-new').addEventListener('click', function() {
      if (!hasNode) return;
      var ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
      var filename = 'note-' + ts + '.md';
      fsModule.writeFileSync(pathModule.join(notesDir, filename), '# New Note\n\n', 'utf8');
      loadFileList();
      openFile(filename);
    });

    document.getElementById('btn-delete').addEventListener('click', function() {
      if (!currentFile || !hasNode) return;
      var filePath = pathModule.join(notesDir, currentFile);
      // Move to trash instead of deleting
      var trashDir = pathModule.join(notesDir, '.trash');
      if (!fsModule.existsSync(trashDir)) fsModule.mkdirSync(trashDir, { recursive: true });
      fsModule.renameSync(filePath, pathModule.join(trashDir, currentFile));
      currentFile = null;
      editorEl.value = '';
      currentFileEl.textContent = 'No file selected';
      loadFileList();
    });

    init();
  </script>
</body>
</html>
