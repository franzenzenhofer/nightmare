<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History - Nightmare Browser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icons/nightmare.svg">
  <link rel="stylesheet" href="../styles/tokens.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: var(--nm-bg-primary); color: var(--nm-text-primary);
      font-family: var(--nm-font-ui); padding: 40px;
    }
    h1 {
      font-size: 24px; font-weight: 600; margin-bottom: 24px;
      color: var(--nm-accent);
    }
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 24px; max-width: 720px;
    }
    .search-input {
      flex: 1; height: 36px; background: var(--nm-bg-input);
      border: 1px solid var(--nm-tab-border);
      border-radius: var(--nm-radius-full); padding: 0 16px;
      font-family: var(--nm-font-url); font-size: var(--nm-text-base);
      color: var(--nm-text-primary); outline: none;
    }
    .search-input:focus {
      border-color: var(--nm-accent);
      box-shadow: 0 0 0 1px var(--nm-accent-dim);
    }
    .btn {
      height: 36px; padding: 0 16px; border: 1px solid var(--nm-tab-border);
      background: var(--nm-bg-secondary); color: var(--nm-text-secondary);
      border-radius: var(--nm-radius-sm); cursor: pointer;
      font-family: var(--nm-font-ui); font-size: var(--nm-text-xs);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .btn:hover { background: var(--nm-accent); color: #fff; border-color: var(--nm-accent); }
    .btn-danger { border-color: #3a0808; color: var(--nm-zone-web-fg); }
    .btn-danger:hover { background: var(--nm-zone-web-fg); color: #fff; }
    .history-list { max-width: 720px; }
    .history-day {
      font-size: var(--nm-text-xs); color: var(--nm-text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 14px 0 6px; font-weight: 600;
      border-bottom: 1px solid var(--nm-tab-border);
      margin-bottom: 4px;
    }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; border-radius: var(--nm-radius-sm);
      cursor: pointer;
    }
    .history-item:hover { background: var(--nm-bg-hover); }
    .history-time {
      font-size: var(--nm-text-xs); color: var(--nm-text-muted);
      font-family: var(--nm-font-mono); flex-shrink: 0; width: 50px;
    }
    .history-favicon {
      width: 16px; height: 16px; flex-shrink: 0;
      background: var(--nm-bg-tertiary); border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: var(--nm-accent);
    }
    .history-info { flex: 1; min-width: 0; }
    .history-title {
      font-size: var(--nm-text-sm); color: var(--nm-text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-url {
      font-size: var(--nm-text-xs); color: var(--nm-text-muted);
      font-family: var(--nm-font-mono); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .history-delete {
      width: 24px; height: 24px; display: flex; align-items: center;
      justify-content: center; border: none; background: none;
      color: var(--nm-text-muted); cursor: pointer; border-radius: 4px;
      font-size: 14px; flex-shrink: 0; opacity: 0;
    }
    .history-item:hover .history-delete { opacity: 1; }
    .history-delete:hover { background: #3a0808; color: var(--nm-zone-web-fg); }
    .empty {
      color: var(--nm-text-muted); font-size: var(--nm-text-sm);
      padding: 60px 0; text-align: center;
    }
    .count {
      font-size: var(--nm-text-xs); color: var(--nm-text-muted);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>History</h1>
  <div class="toolbar">
    <input class="search-input" id="search" type="text" placeholder="Search history..." autofocus>
    <button class="btn btn-danger" id="btn-clear">Clear All</button>
  </div>
  <div class="count" id="count"></div>
  <div class="history-list" id="history-list">
    <div class="empty">Loading...</div>
  </div>
  <script>
    var fs, pathMod, os;
    try { fs = require('fs'); pathMod = require('path'); os = require('os'); } catch(e) {}

    var historyFile = '';
    var historyData = [];
    var listEl = document.getElementById('history-list');
    var searchEl = document.getElementById('search');
    var countEl = document.getElementById('count');

    function getDataDir() {
      var dir = pathMod.join(os.homedir(), '.nightmare-browser');
      if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
      return dir;
    }

    function loadHistory() {
      if (!fs) return;
      historyFile = pathMod.join(getDataDir(), 'history.json');
      try {
        historyData = JSON.parse(fs.readFileSync(historyFile, 'utf8'));
      } catch(e) {
        historyData = [];
      }
      render();
    }

    function saveHistory() {
      if (!fs) return;
      fs.writeFileSync(historyFile, JSON.stringify(historyData, null, 2), 'utf8');
    }

    function clearElement(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr);
      var today = new Date();
      var yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (d.toDateString() === today.toDateString()) return 'Today';
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    function render(filter) {
      var filtered = historyData;
      if (filter) {
        var q = filter.toLowerCase();
        filtered = historyData.filter(function(h) {
          return (h.title || '').toLowerCase().includes(q) ||
                 (h.url || '').toLowerCase().includes(q);
        });
      }
      countEl.textContent = filtered.length + ' entr' + (filtered.length !== 1 ? 'ies' : 'y');

      clearElement(listEl);

      if (filtered.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = filter ? 'No matches found.' : 'No browsing history yet.';
        listEl.appendChild(empty);
        return;
      }

      // Group by day
      var grouped = {};
      filtered.forEach(function(h) {
        var dayKey = new Date(h.visitedAt).toDateString();
        if (!grouped[dayKey]) grouped[dayKey] = [];
        grouped[dayKey].push(h);
      });

      Object.keys(grouped).forEach(function(dayKey) {
        var dayHeader = document.createElement('div');
        dayHeader.className = 'history-day';
        dayHeader.textContent = formatDate(grouped[dayKey][0].visitedAt);
        listEl.appendChild(dayHeader);

        grouped[dayKey].forEach(function(h) {
          var item = document.createElement('div');
          item.className = 'history-item';

          var time = document.createElement('span');
          time.className = 'history-time';
          time.textContent = new Date(h.visitedAt).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
          item.appendChild(time);

          var fav = document.createElement('div');
          fav.className = 'history-favicon';
          fav.textContent = (h.title || '?')[0].toUpperCase();
          item.appendChild(fav);

          var info = document.createElement('div');
          info.className = 'history-info';

          var title = document.createElement('div');
          title.className = 'history-title';
          title.textContent = h.title || h.url;
          info.appendChild(title);

          var url = document.createElement('div');
          url.className = 'history-url';
          url.textContent = h.displayUrl || h.url;
          info.appendChild(url);

          item.appendChild(info);

          var del = document.createElement('button');
          del.className = 'history-delete';
          del.textContent = '\u2715';
          del.addEventListener('click', function(e) {
            e.stopPropagation();
            var realIdx = historyData.indexOf(h);
            if (realIdx >= 0) {
              historyData.splice(realIdx, 1);
              saveHistory();
              render(searchEl.value);
            }
          });
          item.appendChild(del);

          item.addEventListener('click', function() {
            try {
              window.top.postMessage({ type: 'nightmare-navigate', url: h.url }, '*');
            } catch(e) {}
          });

          listEl.appendChild(item);
        });
      });
    }

    searchEl.addEventListener('input', function() { render(this.value); });

    document.getElementById('btn-clear').addEventListener('click', function() {
      historyData = [];
      saveHistory();
      render();
    });

    loadHistory();
  </script>
</body>
</html>
