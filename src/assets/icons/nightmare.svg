<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#08080d"/>
  <g fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round">
    <!-- N letter -->
    <line x1="32" y1="96" x2="32" y2="32"/>
    <line x1="32" y1="32" x2="96" y2="96"/>
    <line x1="96" y1="32" x2="96" y2="96"/>
  </g>
  <!-- Glitch slice -->
  <rect x="0" y="56" width="128" height="8" fill="#08080d" opacity="0.8"/>
  <g fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round" transform="translate(4,0)">
    <line x1="32" y1="56" x2="32" y2="64" opacity="0.6"/>
    <line x1="52" y1="56" x2="60" y2="64" opacity="0.6"/>
    <line x1="96" y1="56" x2="96" y2="64" opacity="0.6"/>
  </g>
  <!-- Glow -->
  <line x1="32" y1="96" x2="32" y2="32" stroke="#e63946" stroke-width="2" opacity="0.3" filter="blur(4px)"/>
</svg>
